<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Pages Demo</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        p {
            font-size: 1.2em;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .button {
            background: white;
            color: #667eea;
            border: none;
            padding: 15px 30px;
            font-size: 1.1em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
        }
        .button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .feature {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .feature h3 {
            margin-top: 0;
            font-size: 1.3em;
        }
        .emoji {
            font-size: 2em;
            margin-bottom: 10px;
            display: block;
        }
        .time {
            margin-top: 20px;
            font-size: 0.9em;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 GitHub Pages Demo</h1>
        <p>恭喜！你已经成功部署了第一个GitHub Pages页面。</p>
        
        <div class="features">
            <div class="feature">
                <span class="emoji">🚀</span>
                <h3>免费托管</h3>
                <p>完全免费，无需服务器</p>
            </div>
            <div class="feature">
                <span class="emoji">🔒</span>
                <h3>HTTPS支持</h3>
                <p>自动SSL证书</p>
            </div>
            <div class="feature">
                <span class="emoji">⚡</span>
                <h3>快速部署</h3>
                <p>几分钟即可上线</p>
            </div>
        </div>
        
        <a href="https://docs.github.com/en/pages" class="button" target="_blank">
            阅读官方文档
        </a>
        
        <div class="time">
            页面部署时间：<span id="deploy-time"></span>
        </div>
    </div>

    <script>
        // 显示当前时间
        document.getElementById('deploy-time').textContent = new Date().toLocaleString('zh-CN');
        
        // 添加一些交互效果
        document.querySelector('.button').addEventListener('click', function(e) {
            e.preventDefault();
            alert('🎉 欢迎使用GitHub Pages！这是你的第一个静态网站。');
        });
    </script>
</body>
</html>
