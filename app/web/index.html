<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待办事项</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="bg"></div>
    <div class="noise"></div>
    <div class="orbs"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>
    <div class="confetti-container" id="confetti"></div>

    <div class="app">
        <div class="header">
            <div class="icon">✨</div>
            <h1>待办事项</h1>
            <p>高效管理，轻松每一天</p>
        </div>

        <div class="card">
            <div class="card-glow"></div>
            <div class="input-group">
                <div class="input-wrap">
                    <span class="input-icon">📌</span>
                    <input type="text" id="taskInput" placeholder="输入新任务..." autofocus>
                </div>
                <button onclick="addTask()" class="btn-add">添加</button>
            </div>

            <div class="due-row">
                <span class="due-icon">📅</span>
                <input type="datetime-local" id="dueDate">
            </div>

            <div class="priority-selector">
                <label class="p-urgent-important">
                    <input type="radio" name="priority" value="urgent-important" checked>
                    <span class="dot"></span>重要紧急
                </label>
                <label class="p-not-urgent-important">
                    <input type="radio" name="priority" value="not-urgent-important">
                    <span class="dot"></span>重要不紧急
                </label>
                <label class="p-urgent-not-important">
                    <input type="radio" name="priority" value="urgent-not-important">
                    <span class="dot"></span>不重要紧急
                </label>
                <label class="p-not-urgent-not-important">
                    <input type="radio" name="priority" value="not-urgent-not-important">
                    <span class="dot"></span>不重要不紧急
                </label>
            </div>

            <div class="progress-section">
                <div class="progress-header">
                    <span>完成进度</span>
                    <span class="progress-text" id="progressText">0%</span>
                </div>
                <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
            </div>

            <div class="stats-bar">
                <div class="stats">
                    <div class="stat stat-pending"><span class="stat-icon">⏳</span>待完成 <strong id="pendingCount">0</strong></div>
                    <div class="stat stat-done"><span class="stat-icon">✅</span>已完成 <strong id="doneCount">0</strong></div>
                </div>
            </div>

            <div class="toolbar" id="filterBar">
                <div class="toolbar-group">
                    <button class="active" onclick="setFilter('all', this)">全部</button>
                    <button onclick="setFilter('pending', this)">待完成</button>
                    <button onclick="setFilter('done', this)">已完成</button>
                </div>
                <div class="toolbar-divider"></div>
                <div class="toolbar-group">
                    <button class="active" onclick="setGroup('none', this)">不分组</button>
                    <button onclick="setGroup('day', this)">按天</button>
                    <button onclick="setGroup('week', this)">按周</button>
                    <button onclick="setGroup('month', this)">按月</button>
                </div>
            </div>

            <div id="taskListContainer"></div>

            <div class="card-footer" id="cardFooter" style="display:none">
                <span class="footer-text" id="footerText">共 <strong id="totalCount">0</strong> 项任务</span>
                <button class="btn-clear" onclick="clearCompleted()">清除已完成</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
